name: 🎵 AeroPlayer — Build desde ZIP

on:
  push:
    branches: [ main, master, principal ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Compilar APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Descomprimir proyecto
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -z "$ZIP" ]; then
            echo "❌ No se encontró ningún ZIP"
            exit 1
          fi
          echo "✅ ZIP encontrado: $ZIP"
          unzip -q "$ZIP" -d proyecto_temp
          cd proyecto_temp
          INNER=$(ls -1 | head -1)
          cd ..
          COUNT=$(ls proyecto_temp | wc -l)
          if [ "$COUNT" -eq 1 ] && [ -d "proyecto_temp/$INNER" ]; then
            echo "Carpeta contenedora: $INNER"
            cp -r "proyecto_temp/$INNER/." .
          else
            cp -r proyecto_temp/. .
          fi
          ls -la

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Permisos gradlew
        run: chmod +x gradlew

      - name: 📦 Gradle wrapper jar
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.9 || true
          fi

      - name: 🏗️ Compilar Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📲 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: AeroPlayer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

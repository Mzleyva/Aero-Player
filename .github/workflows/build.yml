name: 🎵 AeroPlayer — Build desde ZIP

on:
  push:
    branches: [ main, master, principal ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Compilar APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Descomprimir proyecto
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -z "$ZIP" ]; then
            echo "❌ No se encontró ningún ZIP"
            exit 1
          fi
          echo "✅ ZIP encontrado: $ZIP"
          unzip -q "$ZIP" -d proyecto_temp
          COUNT=$(ls proyecto_temp | wc -l)
          INNER=$(ls -1 proyecto_temp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "proyecto_temp/$INNER" ]; then
            echo "Carpeta contenedora: $INNER"
            cp -r "proyecto_temp/$INNER/." .
          else
            cp -r proyecto_temp/. .
          fi
          ls -la

      # ── IMPORTANTE: estos 3 pasos DEBEN ir después del unzip ──────────────
      # El gradlew y gradle/wrapper/ salen del ZIP. Si Setup Gradle se ejecuta
      # antes del unzip, no existe el wrapper y lanza ClassNotFoundException.

      - name: 🔑 Permisos gradlew
        run: chmod +x gradlew

      - name: 📦 Descargar gradle-wrapper.jar si falta
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⬇️  Descargando gradle-wrapper.jar..."
            curl -fL -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar
            echo "✅ JAR descargado: $(du -sh gradle/wrapper/gradle-wrapper.jar)"
          else
            echo "✅ gradle-wrapper.jar ya existe"
          fi

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Compilar Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📲 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: AeroPlayer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
